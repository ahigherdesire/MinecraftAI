name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew jar

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Baritone ${{ steps.version.outputs.VERSION }} for MC 26.1.2"
          body: |
            ## Baritone for Minecraft 26.1.2 (Fabric)

            ### Installation
            1. Install Fabric Loader for MC 26.1.2
            2. Place the jar into your `mods` folder
            3. Use `#help` in game chat for commands

            ### Changes
            - Ported from MC 1.21.11 to MC 26.1.2
            - Updated build system to Fabric Loom 1.15 + Gradle 9.4.0
            - Fixed all API changes for unobfuscated MC 26.1.2
          files: build/libs/*.jar
          draft: false
          prerelease: false
